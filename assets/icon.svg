<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fan/ventilation wheel — white paths on transparent background -->
  <!-- Homey renders this on brandColor (#E3000F) background automatically -->
  
  <!-- Outer ring -->
  <circle cx="50" cy="46" r="30" fill="none" stroke="white" stroke-width="5"/>
  
  <!-- Fan blades — 4 blades -->
  <path d="M50 16 C43 26 43 36 50 40 C57 36 57 26 50 16Z" fill="white"/>
  <path d="M50 76 C57 66 57 56 50 52 C43 56 43 66 50 76Z" fill="white"/>
  <path d="M20 46 C30 39 40 39 44 46 C40 53 30 53 20 46Z" fill="white"/>
  <path d="M80 46 C70 53 60 53 56 46 C60 39 70 39 80 46Z" fill="white"/>
  
  <!-- Center hub -->
  <circle cx="50" cy="46" r="7" fill="white"/>
  
  <!-- zehnder text -->
  <text x="50" y="92" text-anchor="middle" 
        font-family="Arial,Helvetica,sans-serif" 
        font-size="11" font-weight="bold" 
        fill="white" letter-spacing="0.3">zehnder</text>
</svg>
